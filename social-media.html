    <style>
        :root {
            --charcoal: #2d2d2d;
            --forest-green: #1b4332;
            --white: #ffffff;
        }

        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #fdfdfd; }

        nav { 
            background: var(--charcoal); 
            padding: 1.5rem 0; 
            text-align: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        
        nav a { 
            color: white !important; 
            text-decoration: none; 
            margin: 0 20px; 
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            letter-spacing: 2px;
        }

        .back-link { display: inline-block; margin: 30px; text-decoration: none; color: var(--forest-green); font-weight: bold; font-size: 0.9rem; }

        .page-header { text-align: center; margin-bottom: 40px; padding: 0 20px; }
        .page-header h1 { font-family: 'Georgia', serif; font-size: 3rem; color: var(--forest-green); margin-bottom: 10px; }
        .page-header p { text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; color: #666; }

        .embed-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .embed-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
            flex-wrap: wrap;
        }

        .centered-row {
            max-width: 800px; 
            margin: 0 auto;
        }

        .embed-card {
            width: 100%;
            max-width: 350px;
            min-height: 500px;
        }

        footer { 
            background: #f9f9f9; 
            padding: 25px 0; 
            text-align: center; 
            font-size: 0.8rem; 
            color: #888; 
            border-top: 1px solid #eee; 
            margin-top: 60px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 1100px) {
            .embed-row { flex-direction: column; align-items: center; }
        }
    </style>
</head>
