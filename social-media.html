    <style>
        :root {
            --charcoal: #2d2d2d;
            --forest-green: #1b4332;

        }

        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #fdfdfd; }

        nav { background: var(--charcoal); padding: 1.2rem; text-align: center; position: sticky; top: 0; z-index: 1000; }
        nav a { color: white !important; text-decoration: none; margin: 0 20px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }

        .back-link { display: inline-block; margin: 30px; text-decoration: none; color: var(--forest-green); font-weight: bold; font-size: 0.9rem; }

        .page-header h1 { font-family: 'Georgia', serif; font-size: 3rem; color: var(--forest-green); margin-bottom: 10px; }
        .page-header p { text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; color: #666; }

        /* The Live Feed Grid */
        .embed-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .embed-card {
            width: 100%;
            max-width: 350px; /* Perfect size for Reels/Posts */
            min-height: 500px; /* Prevents layout jump while loading */
        }

        /* Footer to match your homepage */
        footer { background: #f9f9f9; padding: 25px 0; text-align: center; font-size: 0.8rem; color: #888; border-top: 1px solid #eee; margin-top: 60px; }
