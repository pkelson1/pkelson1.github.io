<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landscapes | Parker Kelson</title>
    <style>
        :root { --charcoal: #2d2d2d; --forest-green: #1b4332; }
        body { margin: 0; background: #fdfdfd; font-family: 'Inter', sans-serif; color: var(--charcoal); }

        nav { background: var(--charcoal); padding: 1.5rem 0; text-align: center; position: sticky; top: 0; z-index: 1000; }
        nav a { color: white; text-decoration: none; margin: 0 20px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }

        .back-link { display: inline-block; margin: 30px; text-decoration: none; color: var(--forest-green); font-weight: bold; }

        .gallery-header { text-align: center; padding: 40px 20px; }
        .gallery-header h1 { font-family: 'Georgia', serif; font-size: 3rem; margin-bottom: 10px; }

        /* Masonry-ish Grid */
            /* The Fix: Grid that respects aspect ratios */
    .gallery-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        padding: 0 15px 40px;
        max-width: 1400px;
        margin: 0 auto;
        justify-content: center;
    }

    .gallery-item {
        flex: 1 1 300px; /* Base width of 300px, but can grow */
        max-width: 450px;
        height: 300px; /* Fixed height creates a clean "window" look */
        cursor: pointer;
        transition: transform 0.3s ease;
        border-radius: 4px;
        overflow: hidden;
    }

    .gallery-item:hover { transform: scale(1.02); }

    .gallery-item img { 
        width: 100%; 
        height: 100%; 
        object-fit: cover; /* This is the secret sauce - it crops rather than squishes */
        display: block; 
    }


        .gallery-item:hover { transform: scale(1.02); }
        .gallery-item img { width: 100%; display: block; }

        /* Lightbox CSS */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }

        #lightbox img { max-width: 90%; max-height: 80%; border-radius: 4px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #lightbox:target { display: flex; } /* Basic toggle */

        @media (max-width: 900px) { .gallery-grid { column-count: 2; } }
        @media (max-width: 600px) { .gallery-grid { column-count: 1; } }
    </style>
</head>
<body>

<nav>
    <a href="index.html">HOME</a>
    <a href="portfolio.html">PORTFOLIO</a>
    <a href="contact.html">CONTACT</a>
</nav>

<a href="visual-arts.html" class="back-link">← BACK TO GALLERIES</a>

<div class="gallery-header">
    <h1>Landscapes</h1>
    <p>Nature & Environment</p>
</div>

<div class="gallery-grid">
    <div class="gallery-item" onclick="openLightbox(this)"><img src="images/landscapes/land-1.webp" alt="Landscape"></div>
    <div class="gallery-item" onclick="openLightbox(this)"><img src="images/landscapes/land-2.webp" alt="Landscape"></div>
    <div class="gallery-item" onclick="openLightbox(this)"><img src="images/landscapes/land-3.webp" alt="Landscape"></div>
    <div class="gallery-item" onclick="openLightbox(this)"><img src="images/landscapes/land-4.webp" alt="Landscape"></div>
    <div class="gallery-item" onclick="openLightbox(this)"><img src="images/landscapes/land-5.webp" alt="Landscape"></div>
    <div class="gallery-item" onclick="openLightbox(this)"><img src="images/landscapes/land-6.webp" alt="Landscape"></div>
    <div class="gallery-item" onclick="openLightbox(this)"><img src="images/landscapes/land-7.webp" alt="Landscape"></div>
    <div class="gallery-item" onclick="openLightbox(this)"><img src="images/landscapes/land-8.webp" alt="Landscape"></div>
    <div class="gallery-item" onclick="openLightbox(this)"><img src="images/landscapes/land-9.webp" alt="Landscape"></div>
    <div class="gallery-item" onclick="openLightbox(this)"><img src="images/landscapes/land-10.webp" alt="Landscape"></div>
    <div class="gallery-item" onclick="openLightbox(this)"><img src="images/landscapes/land-11.webp" alt="Landscape"></div>
</div>

<div id="lightbox" onclick="this.style.display='none'">
    <img id="lightbox-img" src="" alt="Popup">
</div>

<script>
    function openLightbox(element) {
        const imgPath = element.querySelector('img').src;
        document.getElementById('lightbox-img').src = imgPath;
        document.getElementById('lightbox').style.display = 'flex';
    }
</script>

</body>
</html>
