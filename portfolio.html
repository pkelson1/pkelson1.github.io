<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Parker Kelson</title>
    <style>
        :root {
            --charcoal: #2d2d2d;
            --forest-green: #1b4332;
            --white: #ffffff;
            --soft-grey: #f4f4f4;
        }

        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--white); }

        nav { background: var(--charcoal); padding: 1.2rem; text-align: center; position: sticky; top: 0; z-index: 1000; }
        nav a { color: white !important; text-decoration: none; margin: 0 20px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }

        .portfolio-header {
            padding: 80px 20px 40px;
            text-align: center;
            background: var(--soft-grey);
        }

        .portfolio-header h1 { font-family: 'Georgia', serif; font-size: 3rem; color: var(--forest-green); margin: 0; }
        .portfolio-header p { text-transform: uppercase; letter-spacing: 3px; font-size: 0.9rem; color: #666; margin-top: 10px; }

        .portfolio-container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* Styling for the work "cards" */
        .work-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .work-item:hover { transform: translateY(-8px); }
        
        .work-item img, .work-item video {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        .work-info { padding: 20px; }
        .work-info h3 { margin: 0; font-family: 'Georgia', serif; color: var(--forest-green); }
        .work-info p { margin: 10px 0 0; font-size: 0.9rem; color: #777; }

        footer { background: #f9f9f9; padding: 25px 0; text-align: center; font-size: 0.8rem; color: #888; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">HOME</a>
    <a href="portfolio.html">PORTFOLIO</a>
    <a href="contact.html">CONTACT</a>
</nav>

<div class="hub-wrapper">
    <a href="#social-section" class="hub-card" style="background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('images/social-hero.webp'); background-size: cover;">
        <div class="hub-content">
            <h2>Social Media</h2>
            <p>UGC & STRATEGIC CONTENT</p>
        </div>
    </a>

    <a href="#photo-section" class="hub-card photography-card" style="background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('images/photo-hero.webp'); background-size: cover;">
        <div class="hub-content">
            <h2>Visual Arts</h2>
            <p>PHOTOGRAPHY & AERIAL ASSETS</p>
        </div>
    </a>
</div>

<div id="social-section" class="container">
    <div class="section-title">
        <h2>Social Media Content</h2>
        <p>A collection of high-engagement Reels and UGC strategy created for Valparaiso University.</p>
    </div>
    
    <div class="masonry-grid">
        </div>
</div>

<style>
    .section-title { text-align: center; margin: 80px 0 40px; }
    .section-title h2 { font-family: 'Georgia', serif; font-size: 2.5rem; color: var(--forest-green); }

    .masonry-grid {
        column-count: 3;
        column-gap: 20px;
        padding: 0 20px;
    }

    @media (max-width: 900px) { .masonry-grid { column-count: 2; } }
    @media (max-width: 600px) { .masonry-grid { column-count: 1; } }

    /* For photography sub-sections later */
    .photo-gallery-links {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-top: 20px;
    }
</style>


</body>
</html>
