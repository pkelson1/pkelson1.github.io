<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Parker Kelson</title>
    <style>
        :root { --forest: #1b4332; --charcoal: #2d2d2d; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #1a1a1a; color: white; overflow-x: hidden; }

        /* Navigation */
        nav { background: var(--charcoal); padding: 15px 0; text-align: center; width: 100%; position: relative; z-index: 100; }
        nav a { color: white !important; text-decoration: none; margin: 0 15px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }

        /* Hub Container */
        .hub-wrapper {
            display: flex;
            height: calc(100dvh - 50px); /* */
            width: 100%;
        }

        /* Portfolio Cards */
        .hub-card {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background-size: cover;
            background-position: center;
            transition: 0.6s cubic-bezier(0.2, 1, 0.3, 1);
        }

        /* Hover Effect for Desktop */
        @media (min-width: 769px) {
            .hub-card:hover { flex: 1.4; filter: brightness(1.1); }
        }

        /* Overlay & Text */
        .hub-content {
            background: rgba(0,0,0,0.4);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hub-content h2 {
            font-family: 'Georgia', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin: 0;
            text-transform: capitalize;
            color: white;
        }

        .hub-content p {
            letter-spacing: 4px;
            font-size: 0.8rem;
            margin-top: 15px;
            font-weight: bold;
            color: white;
        }

        /* MOBILE FIXES */
        @media (max-width: 768px) {
            .hub-wrapper { 
                flex-direction: column; 
                height: calc(100dvh - 50px); /* */
            }
            
            .hub-card { 
                height: 50% !important; /* */
                flex: none;
            }

            .hub-content h2 { font-size: 2.2rem; }
            .hub-content p { font-size: 0.65rem; letter-spacing: 2px; }
            nav a { margin: 0 8px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html">HOME</a>
    <a href="portfolio.html">PORTFOLIO</a>
    <a href="contact.html">CONTACT</a>
</nav>

<div class="hub-wrapper">
    <a href="social-media.html" class="hub-card" style="background-image: url('images/graphic1.webp');">
        <div class="hub-content">
            <h2>Social Media</h2>
            <p>DIGITAL STORYTELLING & ENGAGEMENT</p>
        </div>
    </a>

    <a href="visual-arts.html" class="hub-card" style="background-image: url('images/beach.webp');">
        <div class="hub-content">
            <h2>Visual Arts</h2>
            <p>PHOTOGRAPHY & AERIAL WORK</p>
        </div>
    </a>
</div>

</body>
</html>
