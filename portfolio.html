<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Portfolio | Parker Kelson</title>
    <style>
        :root { --forest: #1b4332; --charcoal: #2d2d2d; }
body { margin: 0; font-family: 'Inter', sans-serif; background: #1a1a1a; color: white; }

/* 1. Main Banner Sections (Social Media / Visual Arts) */
.portfolio-section {
    position: relative;
    height: 60vh; /* Desktop height */
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

/* 2. Sub-Category Banners (Landscapes / Portraits / Aerial) */
.category-banner {
    position: relative;
    height: 300px; /* Desktop height */
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    overflow: hidden;
}

.overlay {
    background: rgba(0, 0, 0, 0.4);
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 0.3s;
}

/* --- MOBILE SPECIFIC FIXES --- */
@media (max-width: 768px) {
    /* Force banners to be taller so they don't squash */
    .portfolio-section {
        height: 50dvh !important; /* */
        background-attachment: scroll !important; /* */
    }

    /* This is the fix for the thin strips in your screenshot */
    .category-banner {
        height: 200px !important; 
        min-height: 200px !important;
        background-attachment: scroll !important;
    }

    .portfolio-section h2 { font-size: 2rem !important; }
    .category-banner h3 { font-size: 1.5rem !important; }
    
    /* Make sure text doesn't overlap or hide */
    .overlay { padding: 15px; text-align: center; }
}

    </style>
    
</head>
<body>

<nav>
    <a href="index.html">HOME</a>
    <a href="portfolio.html">PORTFOLIO</a>
    <a href="contact.html">CONTACT</a>
</nav>

<div class="hub-wrapper">
    <a href="social-media.html" class="hub-card" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('images/graphic1.webp');">
        <div class="hub-content">
            <h2>Social Media</h2>
            <p>DIGITAL STORYTELLING & ENGAGEMENT</p>
        </div>
    </a>

    <a href="visual-arts.html" class="hub-card photography-card" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('images/beach.webp');">
        <div class="hub-content">
            <h2>Visual Arts</h2>
            <p>PHOTOGRAPHY & AERIAL WORK</p>
        </div>
    </a>
</div>

<style>
    .hub-wrapper {
        display: flex;
        height: calc(100vh - 60px); /* Full screen minus nav height */
        gap: 0;
    }

    .hub-card {
        flex: 1;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        overflow: hidden;
        background-size: cover;
        background-position: center;
        transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1);
    }

    /* The "Premium" Zoom Effect */
    .hub-card:hover {
        flex: 1.3;
        filter: contrast(1.1);
    }

    .hub-content {
        text-align: center;
        color: white;
        z-index: 2;
    }

    .hub-content h2 {
        font-family: 'Georgia', serif;
        font-size: clamp(2rem, 5vw, 3.5rem);
        margin: 0;
        text-transform: capitalize;
    }

    .hub-content p {
        letter-spacing: 4px;
        font-size: 0.8rem;
        margin-top: 15px;
        font-weight: bold;
    }

    @media (max-width: 768px) {
        .hub-wrapper { flex-direction: column; height: auto; }
        .hub-card { height: 50vh; }
    }
</style>



</body>
</html>
