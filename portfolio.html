<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Parker Kelson</title>
    <style>
        :root {
            --charcoal: #2d2d2d;
            --forest-green: #1b4332;
            --white: #ffffff;
            --soft-grey: #f4f4f4;
        }

        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--white); }

        nav { background: var(--charcoal); padding: 1.2rem; text-align: center; position: sticky; top: 0; z-index: 1000; }
        nav a { color: white !important; text-decoration: none; margin: 0 20px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }

        .portfolio-header {
            padding: 80px 20px 40px;
            text-align: center;
            background: var(--soft-grey);
        }

        .portfolio-header h1 { font-family: 'Georgia', serif; font-size: 3rem; color: var(--forest-green); margin: 0; }
        .portfolio-header p { text-transform: uppercase; letter-spacing: 3px; font-size: 0.9rem; color: #666; margin-top: 10px; }

        .portfolio-container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* Styling for the work "cards" */
        .work-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .work-item:hover { transform: translateY(-8px); }
        
        .work-item img, .work-item video {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        .work-info { padding: 20px; }
        .work-info h3 { margin: 0; font-family: 'Georgia', serif; color: var(--forest-green); }
        .work-info p { margin: 10px 0 0; font-size: 0.9rem; color: #777; }

        footer { background: #f9f9f9; padding: 25px 0; text-align: center; font-size: 0.8rem; color: #888; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">HOME</a>
    <a href="portfolio.html">PORTFOLIO</a>
    <a href="contact.html">CONTACT</a>
</nav>

<header class="portfolio-header">
    <h1>Creative Portfolio</h1>
    <p>Strategic Content & Visual Storytelling</p>
</header>

<div class="portfolio-container">
    <div class="work-item">
        <div style="padding: 100px 20px; text-align: center; background: #eee;">
            [First Reel Coming Soon]
        </div>
        <div class="work-info">
            <h3>Social Engagement</h3>
            <p>Valparaiso University Homecoming Reel Strategy</p>
        </div>
    </div>
</div>

<footer>
    &copy; <span id="year"></span> Parker Kelson. All Rights Reserved.
</footer>

<script>
    document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
