<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Portfolio | Parker Kelson</title>
    <style>
        :root {
            --charcoal: #2d2d2d;
            --forest-green: #1b4332;
            --white: #ffffff;
            --soft-grey: #f4f4f4;
        }

        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--white); }

        nav { background: var(--charcoal); padding: 1.2rem; text-align: center; position: sticky; top: 0; z-index: 1000; }
        nav a { color: white !important; text-decoration: none; margin: 0 20px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }

        .portfolio-header {
            padding: 80px 20px 40px;
            text-align: center;
            background: var(--soft-grey);
        }

        .portfolio-header h1 { font-family: 'Georgia', serif; font-size: 3rem; color: var(--forest-green); margin: 0; }
        .portfolio-header p { text-transform: uppercase; letter-spacing: 3px; font-size: 0.9rem; color: #666; margin-top: 10px; }

        .portfolio-container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* Styling for the work "cards" */
        .work-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .work-item:hover { transform: translateY(-8px); }
        
        .work-item img, .work-item video {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        .work-info { padding: 20px; }
        .work-info h3 { margin: 0; font-family: 'Georgia', serif; color: var(--forest-green); }
        .work-info p { margin: 10px 0 0; font-size: 0.9rem; color: #777; }

        footer { background: #f9f9f9; padding: 25px 0; text-align: center; font-size: 0.8rem; color: #888; border-top: 1px solid #eee; }
  
        /* MOBILE OPTIMIZATION */
@media (max-width: 768px) {
    /* 1. Reset the main sections */
    .portfolio-section {
        height: 60dvh !important; /* Dynamic height based on mobile UI */
        min-height: 400px;        /* Safety floor so it never gets too small */
    }

    /* 2. Fix the sub-category "strips" (Landscapes, etc.) */
    .category-banner {
        height: 25dvh !important; 
        min-height: 180px;
        margin-bottom: 2px;
    }

    /* 3. Center the "Visual Arts" content better */
    .category-banner h3 {
        font-size: 1.6rem !important;
        margin: 0;
    }

    /* 4. Force background images to center correctly */
    .portfolio-section, .category-banner {
        background-attachment: scroll !important; /* 'Fixed' breaks on many mobile browsers */
        background-position: center center !important;
        background-size: cover !important;
    }
}

  
    
    </style>
    
</head>
<body>

<nav>
    <a href="index.html">HOME</a>
    <a href="portfolio.html">PORTFOLIO</a>
    <a href="contact.html">CONTACT</a>
</nav>

<div class="hub-wrapper">
    <a href="social-media.html" class="hub-card" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('images/graphic1.webp');">
        <div class="hub-content">
            <h2>Social Media</h2>
            <p>DIGITAL STORYTELLING & ENGAGEMENT</p>
        </div>
    </a>

    <a href="visual-arts.html" class="hub-card photography-card" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('images/beach.webp');">
        <div class="hub-content">
            <h2>Visual Arts</h2>
            <p>PHOTOGRAPHY & AERIAL WORK</p>
        </div>
    </a>
</div>

<style>
    .hub-wrapper {
        display: flex;
        height: calc(100vh - 60px); /* Full screen minus nav height */
        gap: 0;
    }

    .hub-card {
        flex: 1;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        overflow: hidden;
        background-size: cover;
        background-position: center;
        transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1);
    }

    /* The "Premium" Zoom Effect */
    .hub-card:hover {
        flex: 1.3;
        filter: contrast(1.1);
    }

    .hub-content {
        text-align: center;
        color: white;
        z-index: 2;
    }

    .hub-content h2 {
        font-family: 'Georgia', serif;
        font-size: clamp(2rem, 5vw, 3.5rem);
        margin: 0;
        text-transform: capitalize;
    }

    .hub-content p {
        letter-spacing: 4px;
        font-size: 0.8rem;
        margin-top: 15px;
        font-weight: bold;
    }

    @media (max-width: 768px) {
        .hub-wrapper { flex-direction: column; height: auto; }
        .hub-card { height: 50vh; }
    }
</style>



</body>
</html>
