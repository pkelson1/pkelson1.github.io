<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Arts | Parker Kelson</title>
    <style>
        :root {
            --charcoal: #2d2d2d;
            --forest-green: #1b4332;
            --white: #ffffff;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--charcoal); overflow-x: hidden; }

        nav { background: var(--charcoal); padding: 1.5rem 0; text-align: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        nav a { color: white; text-decoration: none; margin: 0 20px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }

        .gallery-hub {
            display: flex;
            height: calc(100vh - 75px); /* Adjust based on nav height */
            width: 100%;
        }

        .category-card {
            flex: 1;
            position: relative;
            text-decoration: none;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: flex 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .category-card:last-child { border-right: none; }

        .category-card:hover { flex: 1.5; }

        .bg-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.6s ease;
            z-index: 1;
        }

        .category-card:hover .bg-img { transform: scale(1.05); }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 2;
            transition: background 0.3s ease;
        }

        .category-card:hover .overlay { background: rgba(27, 67, 50, 0.6); /* Forest Green tint on hover */ }

        .content {
            position: relative;
            z-index: 3;
            text-align: center;
            color: white;
        }

        .content h2 {
            font-family: 'Georgia', serif;
            font-size: 2.5rem;
            margin: 0;
            text-transform: capitalize;
            letter-spacing: 2px;
        }

        .content p {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.7rem;
            margin-top: 10px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .gallery-hub { flex-direction: column; height: auto; }
            .category-card { height: 33.33vh; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html">HOME</a>
    <a href="portfolio.html">PORTFOLIO</a>
    <a href="contact.html">CONTACT</a>
</nav>

<div class="gallery-hub">
    <a href="aerial.html" class="category-card">
        <div class="bg-img" style="background-image: url('images/aerial/cover-aerial.webp');"></div>
        <div class="overlay"></div>
        <div class="content">
            <h2>Aerial</h2>
            <p>Perspectives from above</p>
        </div>
    </a>

    <a href="portraits.html" class="category-card">
        <div class="bg-img" style="background-image: url('images/portraits/cover-portrait.webp');"></div>
        <div class="overlay"></div>
        <div class="content">
            <h2>Portraits</h2>
            <p>Capturing the individual</p>
        </div>
    </a>

    <a href="landscapes.html" class="category-card">
        <div class="bg-img" style="background-image: url('images/landscapes/cover-landscape.webp');"></div>
        <div class="overlay"></div>
        <div class="content">
            <h2>Landscapes</h2>
            <p>Nature & Environment</p>
        </div>
    </a>
</div>

</body>
</html>
