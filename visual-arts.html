<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Arts | Parker Kelson</title>
    <style>
        :root {
            --charcoal: #2d2d2d;
            --forest-green: #1b4332;
            --white: #ffffff;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--charcoal); overflow-x: hidden; }

        /* Consistent Navigation */
        nav { background: var(--charcoal); padding: 15px 0; text-align: center; width: 100%; position: relative; z-index: 1000; }
        nav a { color: white !important; text-decoration: none; margin: 0 15px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }

        /* The Hub Container - Using DVH to prevent mobile squash */
        .gallery-hub {
            display: flex;
            height: calc(100dvh - 50px); 
            width: 100%;
        }

        .category-card {
            flex: 1;
            position: relative;
            text-decoration: none;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: flex 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Hover Effect for Desktop */
        @media (min-width: 769px) {
            .category-card:hover { flex: 1.5; }
            .category-card:hover .bg-img { transform: scale(1.08); filter: brightness(1.1); }
            .category-card:hover .overlay { background: rgba(0, 0, 0, 0.2); }
        }

        .bg-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.6s ease, filter 0.3s ease;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 2;
            transition: background 0.3s ease;
        }

        .content {
            position: relative;
            z-index: 3;
            text-align: center;
            color: white;
        }

        .content h2 {
            font-family: 'Georgia', serif;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            margin: 0;
            text-transform: capitalize;
            letter-spacing: 2px;
        }

        /* MOBILE RESCUE */
        @media (max-width: 768px) {
            .gallery-hub { 
                flex-direction: column; 
                height: calc(100dvh - 50px); /* Forces full screen on mobile */
            }
            .category-card { 
                height: 33.33% !important; /* Divides screen into 3 equal parts */
                flex: none; 
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.1);
            }
            .content h2 { font-size: 2rem; }
            nav a { margin: 0 8px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html">HOME</a>
    <a href="portfolio.html">PORTFOLIO</a>
    <a href="contact.html">CONTACT</a>
</nav>

<div class="gallery-hub">
    <a href="landscapes.html" class="category-card">
        <div class="bg-img" style="background-image: url('images/landscapes/cover-landscape.webp');"></div>
        <div class="overlay"></div>
        <div class="content">
            <h2>Landscapes</h2>
        </div>
    </a>

    <a href="portraits.html" class="category-card">
        <div class="bg-img" style="background-image: url('images/portraits/cover-portrait.webp');"></div>
        <div class="overlay"></div>
        <div class="content">
            <h2>Portraits</h2>
        </div>
    </a>

    <a href="aerial.html" class="category-card">
        <div class="bg-img" style="background-image: url('images/aerial/cover-aerial.webp');"></div>
        <div class="overlay"></div>
        <div class="content">
            <h2>Aerial</h2>
        </div>
    </a>
</div>

</body>
</html>
